<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Checker Pro</title>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: #010409; color: #fff; border: 1px solid #30363d; border-radius: 6px; padding: 10px; box-sizing: border-box; }
        button { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2ea043; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #21262d; padding: 12px; text-align: left; border-bottom: 2px solid #30363d; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #30363d; font-size: 13px; }
        
        /* Solusi blok URL presisi */
        .url-box { display: inline-block; cursor: text; user-select: text; }
        
        /* Fitur sort */
        .sortable { cursor: pointer; text-decoration: underline; color: #58a6ff; }
        .sortable:hover { color: #79c0ff; }
        
        .status-ok { color: #3fb950; font-weight: bold; }
        .status-err { color: #f85149; font-weight: bold; }
        .badge { padding: 2px 8px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 URL Checker Pro</h1>
        <textarea id="urls" placeholder="Masukkan URL (satu per baris)..."></textarea>
        <button onclick="check()">CHECK URL</button>
        <div id="results"></div>
    </div>

    <script>
        let currentData = [];

        async function check() {
            const urls = document.getElementById('urls').value.split('\n').filter(u => u.trim());
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Memproses...";
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    body: JSON.stringify({ urls }),
                    headers: { 'Content-Type': 'application/json' }
                });
                currentData = await response.json();
                renderTable(currentData);
            } catch (err) { resDiv.innerHTML = "Gagal terhubung ke server."; }
        }

        function renderTable(data) {
            let html = `<table><tr>
                <th>URL</th><th>Status</th><th>Provider</th>
                <th class="sortable" onclick="sortData()">Tier ↕</th>
                <th>Latency</th><th>Country</th></tr>`;
            
            data.forEach(item => {
                html += `<tr>
                    <td><div class="url-box">${item.url}</div></td>
                    <td class="${item.status.includes('Online') ? 'status-ok' : 'status-err'}">${item.status}</td>
                    <td><span class="badge">${item.provider || '-'}</span></td>
                    <td>${item.tier || '-'}</td>
                    <td>${item.latency || '-'}</td>
                    <td>${item.country || '-'}</td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('results').innerHTML = html;
        }

        function sortData() {
            currentData.sort((a, b) => (a.tier || "").localeCompare(b.tier || ""));
            renderTable(currentData);
        }
    </script>
</body>
</html>
