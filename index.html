<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 URL Checker Pro - Refined</title>
    <style>
        :root {
            --bg-body: #05070a;
            --bg-card: #0d1117;
            --border: #21262d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --success: #238636;
            --danger: #da3633;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-body); 
            color: var(--text-main); 
            padding: 40px 20px; 
            line-height: 1.6;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2em; margin-bottom: 5px; color: var(--accent); }
        .header p { color: var(--text-dim); }

        textarea { 
            width: 100%; height: 150px; 
            background: #010409; color: #fff;
            border: 1px solid var(--border); border-radius: 8px;
            padding: 15px; font-family: monospace; resize: vertical;
        }
        
        .btn-group { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .btn { 
            padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; 
            font-weight: 600; transition: 0.2s; background: var(--border); color: #fff;
        }
        .btn:hover { background: #30363d; }
        .btn-primary { background: var(--accent); color: #000; }

        .table-wrapper { 
            overflow-x: auto; margin-top: 20px; 
            border: 1px solid var(--border); border-radius: 8px;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #161b22; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9em; }

        /* Status colors */
        .status-online { color: #3fb950; font-weight: bold; }
        .status-error { color: #f85149; font-weight: bold; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🌐 URL Checker Pro</h1>
            <p>Pemeriksa URL Cepat & Aman</p>
        </div>

        <textarea id="urls" placeholder="Masukkan URL (satu per baris)..." spellcheck="false"></textarea>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="checkUrls()" id="checkBtn">Check URL</button>
            <button class="btn" onclick="clearResults()">Clear</button>
        </div>

        <div id="statsContainer"></div>
        <div class="table-wrapper" id="tableWrapper">
            </div>
    </div>

    <script>
        // FUNGSI TETAP SAMA (LOGIKA ORIGINAL)
        async function checkUrls() {
            const btn = document.getElementById('checkBtn');
            const urls = document.getElementById('urls').value.split('\n').filter(u => u.trim());
            if (urls.length === 0) return alert('Masukkan setidaknya satu URL');

            btn.disabled = true;
            btn.innerText = 'Checking...';

            // Integrasi API (Sesuai kode asli)
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls })
                });
                const data = await response.json();
                renderTable(data);
            } catch (e) {
                alert('Gagal menghubungi server');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Check URL';
            }
        }

        function renderTable(data) {
            let html = `<table><thead><tr><th>URL</th><th>Status</th><th>Latency</th></tr></thead><tbody>`;
            data.forEach(r => {
                html += `<tr><td>${r.url}</td><td class="${r.status.includes('Online') ? 'status-online' : 'status-error'}">${r.status}</td><td>${r.latency}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('tableWrapper').innerHTML = html;
        }

        function clearResults() {
            document.getElementById('tableWrapper').innerHTML = '';
            document.getElementById('urls').value = '';
        }
    </script>
</body>
</html>
