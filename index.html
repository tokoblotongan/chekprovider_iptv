<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Checker Pro</title>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: #010409; color: #fff; border: 1px solid #30363d; border-radius: 6px; padding: 10px; box-sizing: border-box; }
        .btn-main { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main:hover { background: #2ea043; }
        
        /* Tombol Copy All */
        .btn-copy-all { background: #1f883d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 10px; display: inline-block; }
        .btn-copy-all:hover { background: #2ea043; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #21262d; padding: 12px; text-align: left; border-bottom: 2px solid #30363d; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #30363d; font-size: 13px; }
        
        .url-box { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background 0.2s; display: inline-block; }
        .url-box:hover { background: #30363d; color: #58a6ff; }
        
        .sortable { cursor: pointer; text-decoration: underline; color: #58a6ff; }
        .status-ok { color: #3fb950; font-weight: bold; }
        .status-err { color: #f85149; font-weight: bold; }
        .badge { padding: 2px 8px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; font-size: 11px; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #238636; color: white; padding: 10px 20px; border-radius: 6px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 URL Checker Pro</h1>
        <textarea id="urls" placeholder="Masukkan URL..."></textarea>
        <button class="btn-main" onclick="check()">CHECK URL</button>
        
        <div id="result-controls" style="margin-top: 20px; display: none;">
            <button class="btn-copy-all" onclick="copyAllUrls()">📋 Copy All URLs</button>
            <div id="results"></div>
        </div>
    </div>
    <div id="toast">Disalin ke clipboard!</div>

    <script>
        let currentData = [];

        async function check() {
            const urls = document.getElementById('urls').value.split('\n').filter(u => u.trim());
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Memproses...";
            document.getElementById('result-controls').style.display = 'block';
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    body: JSON.stringify({ urls }),
                    headers: { 'Content-Type': 'application/json' }
                });
                currentData = await response.json();
                renderTable(currentData);
            } catch (err) { resDiv.innerHTML = "Gagal terhubung."; }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showToast("URL disalin!");
        }

        function copyAllUrls() {
            const allUrls = currentData.map(item => item.url).join('\n');
            navigator.clipboard.writeText(allUrls);
            showToast("Semua URL disalin!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function renderTable(data) {
            let html = `<table><tr><th>URL</th><th>Status</th><th>Provider</th><th class="sortable" onclick="sortData()">Tier ↕</th><th>Latency</th><th>Country</th></tr>`;
            data.forEach(item => {
                html += `<tr>
                    <td><div class="url-box" onclick="copyToClipboard('${item.url}')" title="Klik untuk Copy">${item.url}</div></td>
                    <td class="${item.status.includes('Online') ? 'status-ok' : 'status-err'}">${item.status}</td>
                    <td><span class="badge">${item.provider || '-'}</span></td>
                    <td>${item.tier || '-'}</td>
                    <td>${item.latency || '-'}</td>
                    <td>${item.country || '-'}</td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('results').innerHTML = html;
        }

        function sortData() {
            currentData.sort((a, b) => (a.tier || "").localeCompare(b.tier || ""));
            renderTable(currentData);
        }
    </script>
</body>
</html>
