<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Checker Pro</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; }
        h1 { color: #58a6ff; text-align: center; }
        textarea { width: 100%; height: 150px; background: #010409; color: #fff; border: 1px solid #30363d; border-radius: 6px; padding: 10px; margin: 10px 0; }
        button { background: #238636; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #2ea043; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 URL Checker Pro</h1>
        <textarea id="urls" placeholder="Masukkan URL..."></textarea>
        <button onclick="check()">CHECK URL</button>
        <div id="results"></div>
    </div>
    <script>
        async function check() {
            const urls = document.getElementById('urls').value.split('\n');
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Memeriksa...";
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    body: JSON.stringify({ urls }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                resDiv.innerHTML = JSON.stringify(data, null, 2);
            } catch (err) { resDiv.innerHTML = "Error: Pastikan backend berjalan."; }
        }
    </script>
</body>
</html>
