<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Checker Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8e8e8;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .input-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-section textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-section textarea::placeholder {
            color: #999;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 12px;
            border: 1px solid #e8e8e8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        table th {
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }

        table td {
            padding: 10px 15px;
            border-bottom: 1px solid #e8e8e8;
        }

        table tbody tr:hover {
            background: #f8f9fa;
        }

        .status-online {
            color: #28a745;
            font-weight: 600;
        }

        .status-error {
            color: #dc3545;
            font-weight: 600;
        }

        .status-warning {
            color: #ffc107;
            font-weight: 600;
        }

        .provider-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #e8e8e8;
            color: #333;
        }

        .tier-enterprise {
            background: #ffd700;
            color: #333;
        }

        .tier-premium {
            background: #c0c0c0;
            color: #333;
        }

        .country-flag {
            font-size: 1.2em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            width: 100%;
            background: #e8e8e8;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            height: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            width: 0%;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 12px;
            }

            table th, table td {
                padding: 8px 10px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 URL Checker Pro</h1>
            <p>Check status, provider, latency, and location of multiple URLs</p>
        </div>

        <div class="input-section">
            <textarea id="urlInput" placeholder="Masukkan URL satu per baris&#10;Contoh:&#10;https://google.com&#10;https://github.com&#10;https://vercel.com&#10;&#10;Tekan 'Check URLs' untuk mulai memeriksa..."></textarea>
            <div class="button-group">
                <button class="btn btn-primary" id="checkBtn" onclick="checkUrls()">
                    <span id="checkIcon">🔍</span> Check URLs
                </button>
                <button class="btn btn-secondary" onclick="loadSample()">📝 Load Sample</button>
                <button class="btn btn-success" onclick="exportCSV()">📊 Export CSV</button>
                <button class="btn btn-danger" onclick="clearResults()">🗑️ Clear Results</button>
                <span id="progressText" style="margin-left: auto; color: #666; font-weight: 600;"></span>
            </div>
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="stats" id="statsContainer" style="display: none;">
            <div class="stat-item">
                <div class="number" id="totalUrls">0</div>
                <div class="label">Total URLs</div>
            </div>
            <div class="stat-item">
                <div class="number" id="onlineUrls">0</div>
                <div class="label">✅ Online</div>
            </div>
            <div class="stat-item">
                <div class="number" id="errorUrls">0</div>
                <div class="label">❌ Errors</div>
            </div>
            <div class="stat-item">
                <div class="number" id="avgLatency">0ms</div>
                <div class="label">Avg Latency</div>
            </div>
        </div>

        <div class="table-wrapper" id="tableWrapper">
            <div class="empty-state">
                <div class="icon">🚀</div>
                <p>Masukkan URL di atas dan klik "Check URLs"</p>
                <p style="font-size: 0.9em; margin-top: 5px;">Supports up to 50 URLs concurrent</p>
            </div>
        </div>
    </div>

    <script>
        let results = [];
        let isChecking = false;

        // Sample URLs
        function loadSample() {
            const sample = `https://google.com
        https://github.com
        https://vercel.com
        https://cloudflare.com
        https://aws.amazon.com
        https://azure.microsoft.com
        https://digitalocean.com
        https://hetzner.com
        https://ovh.com
        https://contabo.com`;
            document.getElementById('urlInput').value = sample;
        }

        // Clear results
        function clearResults() {
            if (confirm('Hapus semua hasil?')) {
                results = [];
                document.getElementById('tableWrapper').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🚀</div>
                        <p>Masukkan URL di atas dan klik "Check URLs"</p>
                        <p style="font-size: 0.9em; margin-top: 5px;">Supports up to 50 URLs concurrent</p>
                    </div>
                `;
                document.getElementById('statsContainer').style.display = 'none';
                document.getElementById('progressContainer').style.display = 'none';
            }
        }

        // Export to CSV
        function exportCSV() {
            if (results.length === 0) {
                alert('Tidak ada data untuk diekspor!');
                return;
            }

            const headers = ['No', 'URL', 'Status', 'Provider', 'Tier', 'Latency', 'Country'];
            const rows = results.map((r, i) => [
                i + 1,
                r.url,
                r.status,
                r.provider,
                r.tier || '-',
                r.latency,
                r.country
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `url-check-results-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Main check function
        async function checkUrls() {
            if (isChecking) return;

            const input = document.getElementById('urlInput');
            const urls = input.value.split('\n').filter(u => u.trim() !== '');

            if (urls.length === 0) {
                alert('Masukkan minimal 1 URL!');
                return;
            }

            if (urls.length > 50) {
                alert('Maksimal 50 URL untuk performa optimal');
                return;
            }

            isChecking = true;
            const checkBtn = document.getElementById('checkBtn');
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<span class="loading-spinner"></span> Checking...';

            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            progressContainer.style.display = 'block';

            results = [];
            let completed = 0;

            // Update progress
            const updateProgress = () => {
                completed++;
                const percent = (completed / urls.length) * 100;
                progressBar.style.width = percent + '%';
                document.getElementById('progressText').textContent = 
                    `${completed}/${urls.length} URLs`;
            };

            // Check each URL with concurrency
            const concurrency = 10;
            const batches = [];
            for (let i = 0; i < urls.length; i += concurrency) {
                batches.push(urls.slice(i, i + concurrency));
            }

            for (const batch of batches) {
                const promises = batch.map(async (url) => {
                    const result = await checkSingleUrl(url.trim());
                    results.push(result);
                    updateProgress();
                    return result;
                });
                await Promise.all(promises);
            }

            // Display results
            displayResults(results);
            updateStats(results);

            isChecking = false;
            checkBtn.disabled = false;
            checkBtn.innerHTML = '🔍 Check URLs';

            setTimeout(() => {
                progressContainer.style.display = 'none';
                document.getElementById('progressText').textContent = '';
            }, 500);
        }

        // Check single URL
        async function checkSingleUrl(url) {
            const result = {
                url: url,
                status: '❌ Error',
                provider: 'Unknown',
                tier: '',
                latency: '-',
                country: '-'
            };

            try {
                // Normalize URL
                let fullUrl = url;
                if (!fullUrl.startsWith('http://') && !fullUrl.startsWith('https://')) {
                    fullUrl = 'http://' + fullUrl;
                }

                const urlObj = new URL(fullUrl);
                const host = urlObj.hostname;
                const port = urlObj.port || 80;

                // Measure latency
                const startTime = performance.now();
                const response = await fetch(fullUrl, {
                    method: 'GET',
                    mode: 'no-cors',
                    headers: {
                        'User-Agent': 'Mozilla/5.0'
                    }
                });
                const endTime = performance.now();
                result.latency = `${Math.round(endTime - startTime)} ms`;

                // Get IP and location info using ip-api.com
                try {
                    const ipResponse = await fetch(`https://ip-api.com/json/${host}?fields=status,country,isp,org,as,hosting`);
                    const ipData = await ipResponse.json();

                    if (ipData.status === 'success') {
                        result.country = ipData.country || '-';
                        const text = `${ipData.isp || ''} ${ipData.org || ''} ${ipData.as || ''}`.toLowerCase();

                        // Provider detection
                        const providers = {
                            'cloudflare': ['Cloudflare', '🏆 Enterprise'],
                            'amazon aws': ['Amazon AWS', '🏆 Enterprise'],
                            'google cloud': ['Google Cloud', '🏆 Enterprise'],
                            'microsoft azure': ['Microsoft Azure', '🏆 Enterprise'],
                            'hetzner': ['Hetzner', '⭐ Premium'],
                            'ovh': ['OVH', '⭐ Premium'],
                            'contabo': ['Contabo', '⭐ Premium'],
                            'digitalocean': ['DigitalOcean', '⭐ Premium'],
                            'vultr': ['Vultr', '⭐ Premium']
                        };

                        for (const [key, [prov, tier]] of Object.entries(providers)) {
                            if (text.includes(key)) {
                                result.provider = prov;
                                result.tier = tier;
                                break;
                            }
                        }

                        if (result.provider === 'Unknown') {
                            result.provider = ipData.isp || 'Unknown';
                        }
                    }
                } catch (ipError) {
                    // IP lookup failed, continue
                }

                // Determine status
                if (response && response.ok) {
                    result.status = '✅ Online';
                } else if (response) {
                    result.status = `⚠️ ${response.status}`;
                } else {
                    result.status = '✅ Online';
                }

            } catch (error) {
                result.status = `❌ ${error.message.substring(0, 25)}`;
            }

            return result;
        }

        // Display results in table
        function displayResults(results) {
            const wrapper = document.getElementById('tableWrapper');

            if (results.length === 0) {
                wrapper.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😕</div>
                        <p>Tidak ada hasil</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>URL</th>
                            <th>Status</th>
                            <th>Provider</th>
                            <th>Tier</th>
                            <th>Latency</th>
                            <th>Country</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            results.forEach((r, i) => {
                const statusClass = r.status.includes('Online') ? 'status-online' :
                                   r.status.includes('Error') ? 'status-error' : 'status-warning';

                const tierClass = r.tier.includes('Enterprise') ? 'tier-enterprise' :
                                 r.tier.includes('Premium') ? 'tier-premium' : '';

                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" 
                            title="${r.url}">${r.url.substring(0, 60)}</td>
                        <td class="${statusClass}">${r.status}</td>
                        <td><span class="provider-badge">${r.provider}</span></td>
                        <td>${r.tier ? `<span class="provider-badge ${tierClass}">${r.tier}</span>` : '-'}</td>
                        <td>${r.latency}</td>
                        <td>${r.country !== '-' ? `🌍 ${r.country}` : '-'}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            wrapper.innerHTML = html;
        }

        // Update statistics
        function updateStats(results) {
            const stats = document.getElementById('statsContainer');
            stats.style.display = 'grid';

            const total = results.length;
            const online = results.filter(r => r.status.includes('Online')).length;
            const errors = results.filter(r => r.status.includes('Error')).length;
            const latencies = results
                .filter(r => r.latency !== '-')
                .map(r => parseInt(r.latency));

            let avgLatency = '-';
            if (latencies.length > 0) {
                const avg = latencies.reduce((a, b) => a + b, 0) / latencies.length;
                avgLatency = `${Math.round(avg)} ms`;
            }

            document.getElementById('totalUrls').textContent = total;
            document.getElementById('onlineUrls').textContent = online;
            document.getElementById('errorUrls').textContent = errors;
            document.getElementById('avgLatency').textContent = avgLatency;
        }

        // Allow Enter key to trigger check
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                checkUrls();
            }
        });

        // Auto-detect paste
        document.getElementById('urlInput').addEventListener('paste', () => {
            setTimeout(() => {
                const text = document.getElementById('urlInput').value;
                if (text.trim().length > 0) {
                    // Auto-trim extra spaces
                    const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
                    document.getElementById('urlInput').value = lines.join('\n');
                }
            }, 100);
        });

        console.log('🚀 URL Checker Pro loaded!');
        console.log('💡 Tip: Press Ctrl+Enter to check URLs');
    </script>
</body>
</html>
